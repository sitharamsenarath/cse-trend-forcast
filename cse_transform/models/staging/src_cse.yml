version: 2

sources:
  - name: cse_raw
    description: "Raw data from the Sri Lanka Stock Exchange API"
    database: cse_db
    schema: public
    tables:
      - name: fact_stock_prices
        description: "Daily price and volume data for individual tickers"
      - name: dim_stocks
        description: "Master list of stocks and company metadata"
      - name: fact_sector_indices
        description: "Daily performance data for market sectors"